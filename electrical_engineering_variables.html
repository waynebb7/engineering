<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/corporate.css">
    <script src="js/site-layout.js" defer></script>
    <title>Engineering Variables | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page">
    <div class="page-container page-container--narrow">
        <a href="index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref">
            <h1>Engineering Variables</h1>
            <p class="variable-hint">Tap any variable for an explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-var="P" aria-label="Learn about True Power">
                    <div class="variable-symbol">\( P \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">True Power</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="Q" aria-label="Learn about Reactive Power">
                    <div class="variable-symbol">\( Q \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Reactive Power</span>
                        <span class="variable-unit">(Volt-Amps Reactive, VAR)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="S" aria-label="Learn about Apparent Power">
                    <div class="variable-symbol">\( S \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Apparent Power</span>
                        <span class="variable-unit">(Volt-Amps, VA)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="V_L" aria-label="Learn about Line Voltage">
                    <div class="variable-symbol">\( V_L \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Line Voltage</span>
                        <span class="variable-unit">(Volts, V)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="V_Ph" aria-label="Learn about Phase Voltage">
                    <div class="variable-symbol">\( V_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Phase Voltage</span>
                        <span class="variable-unit">(Volts, V)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="I_L" aria-label="Learn about Line Current">
                    <div class="variable-symbol">\( I_L \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Line Current</span>
                        <span class="variable-unit">(Amperes, A)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="I_Ph" aria-label="Learn about Phase Current">
                    <div class="variable-symbol">\( I_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Phase Current</span>
                        <span class="variable-unit">(Amperes, A)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="PF" aria-label="Learn about Power Factor">
                    <div class="variable-symbol">\( PF \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Power Factor for True Power \( \cos(\theta) \)</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="RF" aria-label="Learn about Reactive Factor">
                    <div class="variable-symbol">\( RF \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Reactive Factor for Reactive Power \( \sin(\theta) \)</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="R" aria-label="Learn about Resistance">
                    <div class="variable-symbol">\( R \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Resistance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="X_L" aria-label="Learn about Inductive Reactance">
                    <div class="variable-symbol">\( X_L \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Inductive Reactance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="X_C" aria-label="Learn about Capacitive Reactance">
                    <div class="variable-symbol">\( X_C \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Capacitive Reactance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="Z" aria-label="Learn about Impedance">
                    <div class="variable-symbol">\( Z \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Impedance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="f" aria-label="Learn about Frequency">
                    <div class="variable-symbol">\( f \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Frequency</span>
                        <span class="variable-unit">(Hertz, Hz)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="E" aria-label="Learn about Energy">
                    <div class="variable-symbol">\( E \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="cos_theta" aria-label="Learn about Cosine of Phase Angle">
                    <div class="variable-symbol">\( \cos(\theta) \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Cosine of Phase Angle</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="sin_theta" aria-label="Learn about Sine of Phase Angle">
                    <div class="variable-symbol">\( \sin(\theta) \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Sine of Phase Angle</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="variableModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="modalSymbol"></div>
            <h2 id="modalTitle"></h2>
            <p class="var-modal__explain" id="modalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="modalExample"></p>
            </div>
        </div>
    </div>

    <script src="js/variable-details.js" defer></script>
</body>
</html>
