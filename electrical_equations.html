<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/corporate.css">
    <script src="js/site-layout.js" defer></script>
    <title>Electrical Engineering Equations | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page variable-ref-page--equations">
    <div class="page-container page-container--narrow">
        <a href="index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref variable-ref--equations">
            <h1>Electrical Engineering Equations</h1>
            <p class="variable-hint">Tap any equation for a quick explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-eq="dc_power" aria-label="Learn about DC Power Formula">
                    <div class="variable-symbol">\( P = V \times I \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">DC Power Formula</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="ac_single" aria-label="Learn about Single-Phase AC Power">
                    <div class="variable-symbol">\( P = V \times I \times \cos(\theta) \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Single-Phase AC Power</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="ac_three" aria-label="Learn about Three-Phase AC Power">
                    <div class="variable-symbol">\( P = \sqrt{3} \times V_L \times I_L \times \cos(\theta) \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Three-Phase AC Power</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="apparent" aria-label="Learn about Apparent Power Calculation">
                    <div class="variable-symbol">\( S = \sqrt{P^2 + Q^2} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Apparent Power Calculation</span>
                        <span class="variable-unit">(Volt-Amps, VA)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="reactive" aria-label="Learn about Reactive Power Formula">
                    <div class="variable-symbol">\( Q = V \times I \times \sin(\theta) \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Reactive Power Formula</span>
                        <span class="variable-unit">(Volt-Amps Reactive, VAR)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="ohms" aria-label="Learn about Ohm's Law">
                    <div class="variable-symbol">\( R = \frac{V}{I} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Ohm's Law (Resistance Calculation)</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="impedance" aria-label="Learn about Impedance Formula">
                    <div class="variable-symbol">\( Z = \sqrt{R^2 + X^2} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Impedance Formula</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="xl" aria-label="Learn about Inductive Reactance">
                    <div class="variable-symbol">\( X_L = 2\pi f L \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Inductive Reactance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="xc" aria-label="Learn about Capacitive Reactance">
                    <div class="variable-symbol">\( X_C = \frac{1}{2\pi f C} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Capacitive Reactance</span>
                        <span class="variable-unit">(Ohms, \( \Omega \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="star_voltage" aria-label="Learn about Star line and phase voltage">
                    <div class="variable-symbol">\( V_L = \sqrt{3} \times V_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Star Connection: Line vs. Phase Voltage</span>
                        <span class="variable-unit">(Volts, V)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="star_current" aria-label="Learn about Star line and phase current">
                    <div class="variable-symbol">\( I_L = I_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Star Connection: Line vs. Phase Current</span>
                        <span class="variable-unit">(Amps, A)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="delta_voltage" aria-label="Learn about Delta line and phase voltage">
                    <div class="variable-symbol">\( V_L = V_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Delta Connection: Line vs. Phase Voltage</span>
                        <span class="variable-unit">(Volts, V)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="delta_current" aria-label="Learn about Delta line and phase current">
                    <div class="variable-symbol">\( I_L = \sqrt{3} \times I_{Ph} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Delta Connection: Line vs. Phase Current</span>
                        <span class="variable-unit">(Amps, A)</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="equationModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="eqModalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="eqModalSymbol"></div>
            <div class="var-modal__diagram" id="eqModalDiagram" hidden></div>
            <h2 id="eqModalTitle"></h2>
            <p class="var-modal__explain" id="eqModalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="eqModalExample"></p>
            </div>
        </div>
    </div>

    <script src="js/circuit-diagrams.js"></script>
    <script src="js/equation-details.js" defer></script>
</body>
</html>
