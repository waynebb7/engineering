<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Engineering Knowledge</title>
    <link rel="stylesheet" href="css/corporate.css">
    <script src="js/site-layout.js" defer></script>
</head>
<body>
    <div class="page-container page-container--narrow">
        <a href="index.html" class="back-link">&larr; Back to Hub</a>

        <h1>Website Feedback</h1>
        <p class="lead">We value your input. Share suggestions, corrections, or feature requests below.</p>

        <div class="feedback-container">
            <form action="mailto:waynebb7@gmail.com" method="post" enctype="text/plain">
                <label for="subject" class="text-muted">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Brief summary of your feedback" required>

                <label for="feedback" class="text-muted">Message</label>
                <textarea id="feedback" name="feedback" maxlength="255" placeholder="Your feedback (max 255 characters)" required></textarea>

                <input type="submit" value="Send Feedback" class="btn--block">
            </form>

            <p class="note">Your message will open in your default email client addressed to waynebb7@gmail.com.</p>
        </div>
    </div>
</body>
</html>
