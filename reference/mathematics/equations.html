<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/corporate.css">
    <script src="../../assets/js/site-layout.js" defer></script>
    <title>Mathematics Equations | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page variable-ref-page--equations">
    <div class="page-container page-container--narrow">
        <a href="../../index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref variable-ref--equations">
            <h1>Mathematics Equations</h1>
            <p class="variable-hint">Tap any equation for a quick explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-eq="quadratic" aria-label="Learn about Quadratic Formula">
                    <div class="variable-symbol">\( x = \dfrac{-b \pm \sqrt{b^2 - 4ac}}{2a} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Quadratic Formula</span>
                        <span class="variable-unit">(Solutions for \( x \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="pythagoras" aria-label="Learn about Pythagoras' Theorem">
                    <div class="variable-symbol">\( a^2 + b^2 = c^2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Pythagoras' Theorem</span>
                        <span class="variable-unit">(Length units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="straight_line" aria-label="Learn about Straight-Line Equation">
                    <div class="variable-symbol">\( y = mx + c \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Straight-Line Equation</span>
                        <span class="variable-unit">(Coordinates)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="gradient" aria-label="Learn about Gradient Formula">
                    <div class="variable-symbol">\( m = \dfrac{y_2 - y_1}{x_2 - x_1} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Gradient Formula</span>
                        <span class="variable-unit">(Unitless or rate units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="sine_rule" aria-label="Learn about Sine Rule">
                    <div class="variable-symbol">\( \dfrac{a}{\sin A} = \dfrac{b}{\sin B} = \dfrac{c}{\sin C} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Sine Rule</span>
                        <span class="variable-unit">(Length and angles)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="cosine_rule" aria-label="Learn about Cosine Rule">
                    <div class="variable-symbol">\( c^2 = a^2 + b^2 - 2ab\cos C \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Cosine Rule</span>
                        <span class="variable-unit">(Length units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="trig_identity" aria-label="Learn about Pythagorean Trig Identity">
                    <div class="variable-symbol">\( \sin^2\theta + \cos^2\theta = 1 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Pythagorean Trig Identity</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="power_rule" aria-label="Learn about Power Rule (Differentiation)">
                    <div class="variable-symbol">\( \dfrac{d}{dx}(x^n) = nx^{n-1} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Power Rule (Differentiation)</span>
                        <span class="variable-unit">(Derivative units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="chain_rule" aria-label="Learn about Chain Rule">
                    <div class="variable-symbol">\( \dfrac{dy}{dx} = \dfrac{dy}{du}\dfrac{du}{dx} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Chain Rule</span>
                        <span class="variable-unit">(Derivative units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="int_power" aria-label="Learn about Power Rule (Integration)">
                    <div class="variable-symbol">\( \int x^n \, dx = \dfrac{x^{n+1}}{n+1} + C \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Power Rule (Integration)</span>
                        <span class="variable-unit">(Integral units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="binomial_sq" aria-label="Learn about Perfect Square Expansion">
                    <div class="variable-symbol">\( (a + b)^2 = a^2 + 2ab + b^2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Perfect Square Expansion</span>
                        <span class="variable-unit">(Algebraic)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="arith_seq" aria-label="Learn about Arithmetic Sequence">
                    <div class="variable-symbol">\( u_n = a + (n-1)d \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Arithmetic Sequence</span>
                        <span class="variable-unit">(Sequence terms)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="geom_seq" aria-label="Learn about Geometric Sequence">
                    <div class="variable-symbol">\( u_n = ar^{n-1} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Geometric Sequence</span>
                        <span class="variable-unit">(Sequence terms)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="log_product" aria-label="Learn about Logarithm Product Rule">
                    <div class="variable-symbol">\( \log_a(xy) = \log_a x + \log_a y \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Logarithm Product Rule</span>
                        <span class="variable-unit">(Logarithmic)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="circle_area" aria-label="Learn about Area of a Circle">
                    <div class="variable-symbol">\( A = \pi r^2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Area of a Circle</span>
                        <span class="variable-unit">(Square units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="sphere_volume" aria-label="Learn about Volume of a Sphere">
                    <div class="variable-symbol">\( V = \tfrac{4}{3}\pi r^3 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Volume of a Sphere</span>
                        <span class="variable-unit">(Cubic units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="eigenvalue" aria-label="Learn about Eigenvalue Equation">
                    <div class="variable-symbol">\( A\mathbf{v} = \lambda\mathbf{v} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Eigenvalue Equation</span>
                        <span class="variable-unit">(Matrix algebra)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="distance_2d" aria-label="Learn about Distance Between Two Points">
                    <div class="variable-symbol">\( d = \sqrt{(x_2-x_1)^2 + (y_2-y_1)^2} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Distance Between Two Points</span>
                        <span class="variable-unit">(Length units)</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="equationModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="eqModalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="eqModalSymbol"></div>
            <div class="var-modal__diagram" id="eqModalDiagram" hidden></div>
            <h2 id="eqModalTitle"></h2>
            <p class="var-modal__explain" id="eqModalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="eqModalExample"></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/equation-details-mathematics.js" defer></script>
    <script src="../../assets/js/equation-ref-ui.js" defer></script>
</body>
</html>
