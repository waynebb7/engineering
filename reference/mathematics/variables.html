<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/corporate.css">
    <script src="../../assets/js/site-layout.js" defer></script>
    <title>Mathematics Variables | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page">
    <div class="page-container page-container--narrow">
        <a href="../../index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref">
            <h1>Mathematics Variables</h1>
            <p class="variable-hint">Tap any mathematical symbol for an explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-var="x" aria-label="Learn about Independent Variable">
                    <div class="variable-symbol">\( x \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Independent Variable</span>
                        <span class="variable-unit">(Context-dependent units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="y" aria-label="Learn about Dependent Variable">
                    <div class="variable-symbol">\( y \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Dependent Variable</span>
                        <span class="variable-unit">(Context-dependent units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="m" aria-label="Learn about Gradient (Slope)">
                    <div class="variable-symbol">\( m \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Gradient (Slope)</span>
                        <span class="variable-unit">(Unitless or rate units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="c_int" aria-label="Learn about Y-Intercept">
                    <div class="variable-symbol">\( c \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Y-Intercept</span>
                        <span class="variable-unit">(Same units as \( y \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="dydx" aria-label="Learn about First Derivative">
                    <div class="variable-symbol">\( \dfrac{dy}{dx} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">First Derivative</span>
                        <span class="variable-unit">(Rate of change units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="d2ydx2" aria-label="Learn about Second Derivative">
                    <div class="variable-symbol">\( \dfrac{d^2y}{dx^2} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Second Derivative</span>
                        <span class="variable-unit">(Rate of change of rate)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="integral" aria-label="Learn about Integral">
                    <div class="variable-symbol">\( \int \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Integral</span>
                        <span class="variable-unit">(Area or accumulation units)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="limit" aria-label="Learn about Limit">
                    <div class="variable-symbol">\( \lim \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Limit</span>
                        <span class="variable-unit">(Approaching a value)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="sum" aria-label="Learn about Summation">
                    <div class="variable-symbol">\( \sum \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Summation</span>
                        <span class="variable-unit">(Sum of terms)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="theta" aria-label="Learn about Angle">
                    <div class="variable-symbol">\( \theta \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Angle</span>
                        <span class="variable-unit">(Radians or degrees)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="pi" aria-label="Learn about Pi">
                    <div class="variable-symbol">\( \pi \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Pi</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="e_euler" aria-label="Learn about Euler's Number">
                    <div class="variable-symbol">\( e \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Euler's Number</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="i_imag" aria-label="Learn about Imaginary Unit">
                    <div class="variable-symbol">\( i \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Imaginary Unit</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="abs" aria-label="Learn about Modulus (Absolute Value)">
                    <div class="variable-symbol">\( |x| \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Modulus (Absolute Value)</span>
                        <span class="variable-unit">(Same units as \( x \))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="log" aria-label="Learn about Logarithm (Base 10)">
                    <div class="variable-symbol">\( \log \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Logarithm (Base 10)</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="ln" aria-label="Learn about Natural Logarithm">
                    <div class="variable-symbol">\( \ln \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Natural Logarithm</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="sin" aria-label="Learn about Sine">
                    <div class="variable-symbol">\( \sin \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Sine</span>
                        <span class="variable-unit">(Unitless ratio)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="cos" aria-label="Learn about Cosine">
                    <div class="variable-symbol">\( \cos \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Cosine</span>
                        <span class="variable-unit">(Unitless ratio)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="tan" aria-label="Learn about Tangent">
                    <div class="variable-symbol">\( \tan \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Tangent</span>
                        <span class="variable-unit">(Unitless ratio)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="matrix_A" aria-label="Learn about Matrix">
                    <div class="variable-symbol">\( A \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Matrix</span>
                        <span class="variable-unit">(Entries depend on context)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="det" aria-label="Learn about Determinant">
                    <div class="variable-symbol">\( \det \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Determinant</span>
                        <span class="variable-unit">(Unitless for square matrices)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="eigenvalue" aria-label="Learn about Eigenvalue">
                    <div class="variable-symbol">\( \lambda \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Eigenvalue</span>
                        <span class="variable-unit">(Same units as linear operator scale)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="nabla" aria-label="Learn about Del (Nabla Operator)">
                    <div class="variable-symbol">\( \nabla \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Del (Nabla Operator)</span>
                        <span class="variable-unit">(Per-unit-length)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="partial" aria-label="Learn about Partial Derivative">
                    <div class="variable-symbol">\( \partial \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Partial Derivative</span>
                        <span class="variable-unit">(Rate with respect to one variable)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="nCr" aria-label="Learn about Binomial Coefficient">
                    <div class="variable-symbol">\( \binom{n}{r} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Binomial Coefficient</span>
                        <span class="variable-unit">(Count of combinations)</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="variableModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="modalSymbol"></div>
            <h2 id="modalTitle"></h2>
            <p class="var-modal__explain" id="modalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="modalExample"></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/variable-details-mathematics.js" defer></script>
    <script src="../../assets/js/variable-ref-ui.js" defer></script>
</body>
</html>
