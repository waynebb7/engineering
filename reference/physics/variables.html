<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/corporate.css">
    <script src="../../assets/js/site-layout.js" defer></script>
    <title>Physics Variables | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page">
    <div class="page-container page-container--narrow">
        <a href="../../index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref">
            <h1>Physics Variables</h1>
            <p class="variable-hint">Tap any physics symbol for an explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-var="F" aria-label="Learn about Force">
                    <div class="variable-symbol">\( F \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Force</span>
                        <span class="variable-unit">(Newtons, N)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="m" aria-label="Learn about Mass">
                    <div class="variable-symbol">\( m \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Mass</span>
                        <span class="variable-unit">(Kilograms, kg)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="a" aria-label="Learn about Acceleration">
                    <div class="variable-symbol">\( a \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Acceleration</span>
                        <span class="variable-unit">(Metres per second squared, m/s\(^2\))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="v" aria-label="Learn about Velocity">
                    <div class="variable-symbol">\( v \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Velocity</span>
                        <span class="variable-unit">(Metres per second, m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="u" aria-label="Learn about Initial Velocity">
                    <div class="variable-symbol">\( u \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Initial Velocity</span>
                        <span class="variable-unit">(Metres per second, m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="s" aria-label="Learn about Displacement">
                    <div class="variable-symbol">\( s \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Displacement</span>
                        <span class="variable-unit">(Metres, m)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="t" aria-label="Learn about Time">
                    <div class="variable-symbol">\( t \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Time</span>
                        <span class="variable-unit">(Seconds, s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="p" aria-label="Learn about Momentum">
                    <div class="variable-symbol">\( p \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Momentum</span>
                        <span class="variable-unit">(Kilogram metres per second, kg m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="W" aria-label="Learn about Work Done">
                    <div class="variable-symbol">\( W \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Work Done</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="Ek" aria-label="Learn about Kinetic Energy">
                    <div class="variable-symbol">\( E_k \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Kinetic Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="Ep" aria-label="Learn about Gravitational Potential Energy">
                    <div class="variable-symbol">\( E_p \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Gravitational Potential Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="P" aria-label="Learn about Mechanical Power">
                    <div class="variable-symbol">\( P \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Mechanical Power</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="g" aria-label="Learn about Gravitational Field Strength">
                    <div class="variable-symbol">\( g \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Gravitational Field Strength</span>
                        <span class="variable-unit">(Metres per second squared, m/s\(^2\))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="rho" aria-label="Learn about Density">
                    <div class="variable-symbol">\( \rho \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Density</span>
                        <span class="variable-unit">(Kilograms per cubic metre, kg/m\(^3\))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="pressure" aria-label="Learn about Pressure">
                    <div class="variable-symbol">\( p \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Pressure</span>
                        <span class="variable-unit">(Pascals, Pa)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="Q" aria-label="Learn about Heat Energy Transferred">
                    <div class="variable-symbol">\( Q \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Heat Energy Transferred</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="c_wave" aria-label="Learn about Wave Speed">
                    <div class="variable-symbol">\( c \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Wave Speed</span>
                        <span class="variable-unit">(Metres per second, m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="f" aria-label="Learn about Frequency">
                    <div class="variable-symbol">\( f \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Frequency</span>
                        <span class="variable-unit">(Hertz, Hz)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="lambda" aria-label="Learn about Wavelength">
                    <div class="variable-symbol">\( \lambda \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Wavelength</span>
                        <span class="variable-unit">(Metres, m)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="T" aria-label="Learn about Period">
                    <div class="variable-symbol">\( T \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Period</span>
                        <span class="variable-unit">(Seconds, s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="mu" aria-label="Learn about Coefficient of Friction">
                    <div class="variable-symbol">\( \mu \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Coefficient of Friction</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="sigma" aria-label="Learn about Stress">
                    <div class="variable-symbol">\( \sigma \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Stress</span>
                        <span class="variable-unit">(Pascals, Pa)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="E_young" aria-label="Learn about Young's Modulus">
                    <div class="variable-symbol">\( E \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Young's Modulus</span>
                        <span class="variable-unit">(Pascals, Pa)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="n" aria-label="Learn about Refractive Index">
                    <div class="variable-symbol">\( n \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Refractive Index</span>
                        <span class="variable-unit">(Unitless)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="B" aria-label="Learn about Magnetic Flux Density">
                    <div class="variable-symbol">\( B \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Magnetic Flux Density</span>
                        <span class="variable-unit">(Tesla, T)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="phi" aria-label="Learn about Magnetic Flux">
                    <div class="variable-symbol">\( \Phi \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Magnetic Flux</span>
                        <span class="variable-unit">(Webers, Wb)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="e" aria-label="Learn about Elementary Charge">
                    <div class="variable-symbol">\( e \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Elementary Charge</span>
                        <span class="variable-unit">(Coulombs, C)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-var="h" aria-label="Learn about Planck Constant">
                    <div class="variable-symbol">\( h \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Planck Constant</span>
                        <span class="variable-unit">(Joule seconds, J s)</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="variableModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="modalSymbol"></div>
            <h2 id="modalTitle"></h2>
            <p class="var-modal__explain" id="modalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="modalExample"></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/variable-details-physics.js" defer></script>
    <script src="../../assets/js/variable-ref-ui.js" defer></script>
</body>
</html>
