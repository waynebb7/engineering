<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/corporate.css">
    <script src="../../assets/js/site-layout.js" defer></script>
    <title>Physics Equations | Engineering Knowledge</title>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
</head>
<body class="variable-ref-page variable-ref-page--equations">
    <div class="page-container page-container--narrow">
        <a href="../../index.html" class="back-link">&larr; Back to Hub</a>

        <div class="variable-ref variable-ref--equations">
            <h1>Physics Equations</h1>
            <p class="variable-hint">Tap any equation for a quick explanation and worked example.</p>

            <div class="variable-list">
                <button type="button" class="variable-row" data-eq="newton2" aria-label="Learn about Newton's Second Law">
                    <div class="variable-symbol">\( F = ma \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Newton's Second Law</span>
                        <span class="variable-unit">(Newtons, N)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="suvat_v" aria-label="Learn about SUVAT: Final Velocity">
                    <div class="variable-symbol">\( v = u + at \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">SUVAT: Final Velocity</span>
                        <span class="variable-unit">(Metres per second, m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="suvat_s" aria-label="Learn about SUVAT: Displacement">
                    <div class="variable-symbol">\( s = ut + \tfrac{1}{2}at^2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">SUVAT: Displacement</span>
                        <span class="variable-unit">(Metres, m)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="suvat_v2" aria-label="Learn about SUVAT: Velocity and Displacement">
                    <div class="variable-symbol">\( v^2 = u^2 + 2as \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">SUVAT: Velocity and Displacement</span>
                        <span class="variable-unit">(Metres per second squared, m/s\(^2\))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="weight" aria-label="Learn about Weight">
                    <div class="variable-symbol">\( W = mg \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Weight</span>
                        <span class="variable-unit">(Newtons, N)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="momentum" aria-label="Learn about Linear Momentum">
                    <div class="variable-symbol">\( p = mv \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Linear Momentum</span>
                        <span class="variable-unit">(kg m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="impulse" aria-label="Learn about Impulse–Momentum Theorem">
                    <div class="variable-symbol">\( F\Delta t = \Delta p \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Impulse–Momentum Theorem</span>
                        <span class="variable-unit">(N s or kg m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="kinetic" aria-label="Learn about Kinetic Energy">
                    <div class="variable-symbol">\( E_k = \tfrac{1}{2}mv^2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Kinetic Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="gpe" aria-label="Learn about Gravitational Potential Energy">
                    <div class="variable-symbol">\( E_p = mgh \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Gravitational Potential Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="power" aria-label="Learn about Mechanical Power">
                    <div class="variable-symbol">\( P = \dfrac{W}{t} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Mechanical Power</span>
                        <span class="variable-unit">(Watts, W)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="pressure" aria-label="Learn about Pressure">
                    <div class="variable-symbol">\( p = \dfrac{F}{A} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Pressure</span>
                        <span class="variable-unit">(Pascals, Pa)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="density" aria-label="Learn about Density">
                    <div class="variable-symbol">\( \rho = \dfrac{m}{V} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Density</span>
                        <span class="variable-unit">(kg/m\(^3\))</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="wave" aria-label="Learn about Wave Equation">
                    <div class="variable-symbol">\( v = f\lambda \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Wave Equation</span>
                        <span class="variable-unit">(Wave speed in m/s)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="hookes" aria-label="Learn about Hooke's Law">
                    <div class="variable-symbol">\( F = kx \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Hooke's Law</span>
                        <span class="variable-unit">(Newtons, N)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="youngs" aria-label="Learn about Young's Modulus">
                    <div class="variable-symbol">\( E = \dfrac{\sigma}{\varepsilon} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Young's Modulus</span>
                        <span class="variable-unit">(Pascals, Pa)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="snell" aria-label="Learn about Snell's Law">
                    <div class="variable-symbol">\( n_1\sin\theta_1 = n_2\sin\theta_2 \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Snell's Law</span>
                        <span class="variable-unit">(Unitless refractive indices)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="motor_effect" aria-label="Learn about Magnetic Force on a Conductor">
                    <div class="variable-symbol">\( F = BIL\sin\theta \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Magnetic Force on a Conductor</span>
                        <span class="variable-unit">(Newtons, N)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="faraday" aria-label="Learn about Faraday's Law (Magnitude)">
                    <div class="variable-symbol">\( \varepsilon = -\dfrac{\Delta\Phi}{\Delta t} \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Faraday's Law (Magnitude)</span>
                        <span class="variable-unit">(Volts, V)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="photon" aria-label="Learn about Photon Energy">
                    <div class="variable-symbol">\( E = hf \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Photon Energy</span>
                        <span class="variable-unit">(Joules, J)</span>
                    </div>
                </button>
                <button type="button" class="variable-row" data-eq="ideal_gas" aria-label="Learn about Ideal Gas Law">
                    <div class="variable-symbol">\( pV = nRT \)</div>
                    <div class="variable-desc">
                        <span class="variable-name">Ideal Gas Law</span>
                        <span class="variable-unit">(Pressure in Pa, volume in m\(^3\))</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="equationModal" class="var-modal" hidden>
        <div class="var-modal__backdrop"></div>
        <div class="var-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="eqModalTitle">
            <button type="button" class="var-modal__close" aria-label="Close">&times;</button>
            <div class="var-modal__symbol" id="eqModalSymbol"></div>
            <div class="var-modal__diagram" id="eqModalDiagram" hidden></div>
            <h2 id="eqModalTitle"></h2>
            <p class="var-modal__explain" id="eqModalExplain"></p>
            <div class="var-modal__example">
                <h3>Example</h3>
                <p id="eqModalExample"></p>
            </div>
        </div>
    </div>

    <script src="../../assets/js/equation-details-physics.js" defer></script>
    <script src="../../assets/js/equation-ref-ui.js" defer></script>
</body>
</html>
