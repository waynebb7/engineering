<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/corporate.css">
    <script src="js/site-layout.js" defer></script>
    <title>To-Do List | Engineering Knowledge</title>
</head>
<body class="calculator-page">
    <div class="page-container page-container--calculator">
        <a href="index.html" class="back-link">&larr; Back to Hub</a>
        <div class="calculator-panel">
            <h1>To-Do List</h1>
            <p class="calc-lead">Add and track tasks in your browser.</p>
            <h2>Add Task</h2>
            <div class="input-container input-container--stacked">
                <input type="text" id="taskInput" placeholder="Enter a task">
                <button type="button" class="btn--block" onclick="addTask()">Add Task</button>
            </div>
            <h2>Your Tasks</h2>
            <ol id="taskList" class="task-list"></ol>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", loadTasks);

        function addTask() {
            var taskInput = document.getElementById("taskInput");
            var taskText = taskInput.value.trim();
            if (taskText === "") return;

            var taskList = document.getElementById("taskList");
            var taskItem = document.createElement("li");
            taskItem.innerHTML = '<input type="checkbox" class="task-checkbox" onchange="toggleTaskCompletion(this)">' +
                '<span>' + taskText + '</span>' +
                '<button type="button" class="task-remove" onclick="removeTask(this)">Remove</button>';
            taskList.appendChild(taskItem);

            saveTasks();
            taskInput.value = "";
        }

        function removeTask(button) {
            button.parentElement.remove();
            saveTasks();
        }

        function toggleTaskCompletion() {
            saveTasks();
        }

        function saveTasks() {
            var tasks = [];
            document.querySelectorAll("#taskList li").forEach(function (taskItem) {
                tasks.push({
                    text: taskItem.querySelector("span").textContent.trim(),
                    completed: taskItem.querySelector(".task-checkbox").checked
                });
            });
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function loadTasks() {
            var storedTasks = JSON.parse(localStorage.getItem("tasks") || "[]");
            var taskList = document.getElementById("taskList");
            taskList.innerHTML = "";
            storedTasks.forEach(function (task) {
                var taskItem = document.createElement("li");
                taskItem.innerHTML = '<input type="checkbox" class="task-checkbox" ' + (task.completed ? "checked" : "") +
                    ' onchange="toggleTaskCompletion(this)">' +
                    '<span>' + task.text + '</span>' +
                    '<button type="button" class="task-remove" onclick="removeTask(this)">Remove</button>';
                taskList.appendChild(taskItem);
            });
        }
    </script>
</body>
</html>
