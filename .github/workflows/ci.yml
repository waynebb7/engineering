name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JavaScript syntax
        run: |
          for file in assets/js/*.js; do
            echo "Checking $file"
            node --check "$file"
          done

      - name: Validate Python scripts
        run: python3 -m compileall scripts

      - name: Verify generated artifacts are up to date
        run: |
          python3 scripts/build-topic-catalog.py
          python3 scripts/build-subject-tree.py
          python3 scripts/build-topic-progression.py
          python3 scripts/build-prereq-node-pages.py
          python3 scripts/build-prereq-maps.py
          python3 scripts/build-drilldown-explorers.py
          python3 scripts/build-quiz-model-answers-json.py
          python3 scripts/extract-quiz-questions.py
          python3 scripts/build-quiz-answers.py
          python3 scripts/build-documents-manifest.py
          git diff --exit-code -- \
            assets/js/topic-catalog.js \
            assets/js/topic-catalog.json \
            meta/tree.html \
            scripts/topic-progression.json \
            maps/prereq-node-pages.json \
            maps/math-prereq-map.html \
            maps/physics-prereq-map.html \
            maps/quantum-prereq-map.html \
            legacy/math-drill-down/explorer.html \
            legacy/math-drill-down/list.html \
            legacy/math-drill-down/topics-data.js \
            legacy/physics-drill-down/explorer.html \
            legacy/physics-drill-down/list.html \
            legacy/physics-drill-down/topics-data.js \
            legacy/quantum-drill-down/explorer.html \
            legacy/quantum-drill-down/list.html \
            legacy/quantum-drill-down/topics-data.js \
            legacy/digital-logic-drill-down/explorer.html \
            legacy/digital-logic-drill-down/list.html \
            legacy/digital-logic-drill-down/topics-data.js \
            scripts/quiz-model-answers.json \
            scripts/quiz-questions.json \
            scripts/quiz-answers.json \
            assets/js/documents-manifest.js

      - name: Verify redirect stubs
        run: python3 scripts/verify-redirect-stubs.py

      - name: Check internal links (core scope)
        run: python3 scripts/check-links.py --scope core

      - name: Check internal links (full site)
        run: python3 scripts/check-links.py --scope all

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
